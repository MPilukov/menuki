name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore Menuki.sln
      - name: Build
        run: dotnet build Menuki.sln -c Release --no-restore --nologo
      - name: Test
        run: dotnet test Menuki.sln -c Release --no-build --nologo

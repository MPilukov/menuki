name: Release

# Tag a commit `vX.Y.Z` and push the tag to build binaries for every platform,
# attach them to a GitHub Release, and auto-update the Homebrew formula:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # One-time setup: create a token that can push to the tap repo and add it as
      # the HOMEBREW_TAP_TOKEN secret. Without it, the formula-bump step is skipped
      # (the release + binaries still publish).
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      TAP_REPO: MPilukov/homebrew-menuki
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build self-contained single-file binaries
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"   # v0.1.3 -> 0.1.3, so `menuki --version` is correct
          mkdir -p out
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64; do
            echo "== publishing $rid =="
            dotnet publish Menuki/Menuki.csproj \
              -c Release -r "$rid" \
              --self-contained true \
              -p:PublishSingleFile=true \
              -p:EnableCompressionInSingleFile=true \
              -p:AssemblyName=menuki \
              -p:Version="$version" \
              -o "dist/$rid" --nologo
            if [ "$rid" = "win-x64" ]; then
              (cd "dist/$rid" && zip -q "../../out/menuki-$rid.zip" menuki.exe)
            else
              tar -C "dist/$rid" -czf "out/menuki-$rid.tar.gz" menuki
            fi
          done
          ls -la out

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" out/* --generate-notes --title "${{ github.ref_name }}"

      # ---- Homebrew tap auto-bump ------------------------------------------
      - name: Check out the Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate the formula for this release
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"          # e.g. v0.1.0
          version="${tag#v}"                    # e.g. 0.1.0
          base="https://github.com/${{ github.repository }}/releases/download/$tag"

          sha() { shasum -a 256 "out/menuki-$1.tar.gz" | awk '{print $1}'; }
          sha_osx_arm=$(sha osx-arm64)
          sha_osx_x64=$(sha osx-x64)
          sha_linux_arm=$(sha linux-arm64)
          sha_linux_x64=$(sha linux-x64)

          cat > tap/Formula/menuki.rb <<RUBY
          class Menuki < Formula
            desc "Interactive terminal menus and runbooks from a single JSON file"
            homepage "https://github.com/${{ github.repository }}"
            version "$version"
            license "MIT"

            on_macos do
              on_arm do
                url "$base/menuki-osx-arm64.tar.gz"
                sha256 "$sha_osx_arm"
              end
              on_intel do
                url "$base/menuki-osx-x64.tar.gz"
                sha256 "$sha_osx_x64"
              end
            end

            on_linux do
              on_arm do
                url "$base/menuki-linux-arm64.tar.gz"
                sha256 "$sha_linux_arm"
              end
              on_intel do
                url "$base/menuki-linux-x64.tar.gz"
                sha256 "$sha_linux_x64"
              end
            end

            def install
              bin.install "menuki"
              generate_completions_from_executable(bin/"menuki", "completions",
                shells: [:bash, :zsh, :fish])
              (buildpath/"menuki.1").write Utils.safe_popen_read(bin/"menuki", "man")
              man1.install "menuki.1"
            end

            def caveats
              <<~EOS
                menuki stores your theme and settings in ~/.menuki (created on first run).
                Get started:
                  menuki tour        Guided, hands-on feature tour
                  menuki examples    Bundled example packs
              EOS
            end

            test do
              (testpath/"m.json").write <<~JSON
                {"title":"t","start_menu":"main","menus":{"main":{"items":[
                  {"name":"x","action":{"type":"shell","command":"echo hi"}}]}}}
              JSON
              assert_match "\"ok\": true", shell_output("#{bin}/menuki validate --config #{testpath}/m.json")
            end
          end
          RUBY

          echo "---- generated formula ----"
          cat tap/Formula/menuki.rb

      - name: Commit and push the formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet; then
            echo "Formula already up to date; nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/menuki.rb
          git commit -m "menuki ${{ github.ref_name }}"
          git push
